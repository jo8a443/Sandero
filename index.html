<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SANDERO GOLD - Gestión & Crecimiento Co.</title>
    
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3202/3202926.png">
    
    <style>
        :root {
            --negro-profundo: #05070a;
            --azul-cobalto: #3b82f6;
            --plateado: #94a3b8;
            --gris-card: #0f172a;
            --texto: #f8fafc;
            --verde-exito: #10b981;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--negro-profundo); 
            padding: 15px; margin: 0; color: var(--texto); 
        }

        .header { 
            background: linear-gradient(180deg, #1e293b 0%, var(--negro-profundo) 100%); 
            padding: 30px; text-align: center; border-radius: 0 0 30px 30px; 
            border-bottom: 3px solid var(--azul-cobalto);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .resumen-container { 
            display: grid; grid-template-columns: 1fr; gap: 15px; margin: 20px 0;
        }

        .resumen-card { 
            background: var(--gris-card); padding: 25px; border-radius: 20px; 
            text-align: center; border: 1px solid #1e293b;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }
        .resumen-card h2 { margin: 10px 0; font-size: 2.2rem; color: var(--azul-cobalto); text-shadow: 0 0 10px rgba(59, 130, 246, 0.4); }

        .card { 
            background: var(--gris-card); padding: 22px; border-radius: 24px; 
            border: 1px solid #1e293b; margin-bottom: 25px; 
        }
        label { display: block; margin-top: 15px; font-weight: 600; color: var(--plateado); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        
        input, select { 
            width: 100%; padding: 14px; margin-top: 8px; border-radius: 12px; 
            border: 1px solid #1e293b; box-sizing: border-box; font-size: 16px; 
            background: #020617; color: white; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--azul-cobalto); box-shadow: 0 0 8px rgba(59, 130, 246, 0.3); }

        #btnGuardar { 
            background: linear-gradient(135deg, #2563eb 0%, #1e3a8a 100%); 
            color: white; border: none; 
            padding: 20px; width: 100%; border-radius: 18px; 
            font-weight: 800; margin-top: 30px; font-size: 1.1rem; 
            text-transform: uppercase; cursor: pointer; letter-spacing: 1px;
        }

        #buscador { width:100%; border: 1px solid #1e293b; background: #020617; padding: 15px; border-radius: 15px; color: white; margin-bottom: 20px; box-sizing: border-box; }

        .contenedor-tabla { overflow-x: auto; background: var(--gris-card); border-radius: 20px; border: 1px solid #1e293b; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { background: #1e293b; color: var(--azul-cobalto); padding: 18px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; border-bottom: 2px solid #0f172a; }
        td { border-bottom: 1px solid #1e293b; padding: 16px; font-size: 0.85rem; text-align: center; color: var(--plateado); }

        .pago-tag { font-size: 0.65rem; background: #1e293b; padding: 5px 10px; border-radius: 8px; color: var(--azul-cobalto); font-weight: bold; }

        .botones-footer { display: flex; gap: 12px; margin-top: 25px; }
        .btn-footer { background: #1e293b; color: white; border: none; padding: 18px; width: 100%; border-radius: 15px; font-weight: bold; font-size: 0.85rem; cursor: pointer; }
        .btn-excel { background: var(--verde-exito); }

        .footer-empresa { 
            margin-top: 50px; background: white; padding: 40px 20px; 
            border-radius: 40px 40px 0 0; text-align: center; color: #111827;
        }
        .logo-text { font-weight: 800; font-size: 1.4rem; letter-spacing: -0.5px; }
        .logo-text span.blue { color: #2563eb; }
        .logo-text span.gray { color: #6b7280; }
        .eslogan { font-size: 0.8rem; color: #4b5563; font-style: italic; margin-top: 2px; }
        
        .btn-soporte { 
            display: inline-flex; align-items: center; justify-content: center; 
            background: #25d366; color: white; padding: 14px 28px; border-radius: 50px; 
            text-decoration: none; font-weight: 700; margin-top: 20px; font-size: 0.95rem;
            box-shadow: 0 4px 15px rgba(37,211,102,0.3);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; font-size: 1.5rem; letter-spacing: 4px; font-weight: 800;">SANDERO <span style="color:var(--azul-cobalto)">GOLD</span></h1>
        <div style="color: var(--plateado); font-size: 0.9rem; margin-top: 5px;">Bitácora de Alto Rendimiento</div>
    </div>

    <div class="resumen-container">
        <div class="resumen-card">
            <p style="color: var(--plateado); margin:0; font-size: 0.8rem; text-transform: uppercase;">Inversión Total en Gestión</p>
            <h2 id="totalGastado">$ 0</h2>
            <p id="totalRegistros" style="color:var(--azul-cobalto); margin:0; font-size:0.85rem; font-weight:bold;">0 Servicios Profesionales</p>
        </div>
    </div>

    <div class="card">
        <label>Fecha del Registro</label>
        <input type="date" id="fecha">
        
        <label>Categoría de Mantenimiento</label>
        <select id="servicio">
            <option value="Mantenimiento Preventivo">Mantenimiento Preventivo</option>
            <option value="Lubricantes / Aceite">Lubricantes / Aceite</option>
            <option value="Frenos / Seguridad">Frenos / Seguridad</option>
            <option value="Llantas / Suspensión">Llantas / Suspensión</option>
            <option value="Sincronización / Motor">Sincronización / Motor</option>
            <option value="Documentación / SOAT">Documentación / SOAT</option>
            <option value="Mejoras / Estética">Mejoras / Estética</option>
            <option value="Otro">Otro servicio técnico</option>
        </select>

        <label>Marca del Repuesto / Insumo</label>
        <input type="text" id="marca" placeholder="Ej: Motul, Bosch, Michelin...">

        <label>Taller / Lugar de Intervención</label>
        <input type="text" id="lugar" placeholder="Nombre del establecimiento">

        <label>Detalle Técnico Adicional</label>
        <input type="text" id="detalle" placeholder="Observaciones de la reparación">

        <label>Inversión Realizada ($)</label>
        <input type="number" id="precio" placeholder="0">

        <label>Instrumento de Pago</label>
        <select id="metodoPago">
            <option value="Efectivo">Efectivo</option>
            <option value="Nequi">Nequi</option>
            <option value="Daviplata">Daviplata</option>
            <option value="Tarjeta Crédito">Tarjeta Crédito</option>
            <option value="Tarjeta Débito">Tarjeta Débito</option>
            <option value="Transferencia">Transferencia</option>
        </select>

        <label>Kilometraje Actual</label>
        <input type="number" id="km" placeholder="KM hoy">

        <label>Kilometraje Próximo Servicio</label>
        <input type="number" id="prox" placeholder="KM proyectado">
        
        <button id="btnGuardar" onclick="guardar()">EJECUTAR REGISTRO MASTER</button>
    </div>

    <input type="text" id="buscador" onkeyup="filtrar()" placeholder="🔍 Filtrar auditoría por fecha, servicio o lugar...">

    <div class="contenedor-tabla">
        <table id="tablaMain">
            <thead>
                <tr>
                    <th>Fecha / Categoría</th>
                    <th>Marca / Lugar</th>
                    <th>Observaciones</th>
                    <th>Inversión / Pago</th>
                    <th>KM Actual</th>
                    <th>KM Próximo</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="botones-footer">
        <button class="btn-footer btn-excel" onclick="exportar()">📊 DESCARGAR EXCEL</button>
        <button class="btn-footer" onclick="document.getElementById('inputFile').click()">📥 IMPORTAR DATOS</button>
    </div>
    <input type="file" id="inputFile" style="display:none" onchange="importar(this)" accept=".csv">

    <div class="footer-empresa">
        <div class="logo-text">
            <span class="blue">GESTIÓN &</span> <span class="gray">CRECIMIENTO CO.</span>
        </div>
        <div class="eslogan">De la estrategia a los resultados</div>
        <a href="https://wa.me/573150581701" class="btn-soporte" target="_blank">
            💬 Soporte Consultoría Gold
        </a>
    </div>

    <div style="height: 30px;"></div>

    <script>
        const KEY = 'DB_SANDERO_MASTER_GOLD'; 

        document.addEventListener("DOMContentLoaded", () => dibujar());

        function guardar() {
            const i = {
                id: Date.now(),
                fecha: document.getElementById('fecha').value,
                servicio: document.getElementById('servicio').value,
                marca: document.getElementById('marca').value || "-",
                lugar: document.getElementById('lugar').value || "-",
                detalle: document.getElementById('detalle').value || "-",
                precio: document.getElementById('precio').value,
                metodo: document.getElementById('metodoPago').value,
                km: document.getElementById('km').value || "0",
                prox: document.getElementById('prox').value || "0"
            };
            if(!i.fecha || !i.precio) return alert("Error: Se requiere Fecha e Inversión");
            let h = JSON.parse(localStorage.getItem(KEY)) || [];
            h.push(i);
            localStorage.setItem(KEY, JSON.stringify(h));
            ['marca', 'lugar', 'detalle', 'precio', 'km', 'prox'].forEach(id => document.getElementById(id).value = "");
            dibujar();
            alert("✅ Registro de Auditoría Guardado");
        }

        function dibujar() {
            const tbody = document.querySelector('#tablaMain tbody');
            const h = JSON.parse(localStorage.getItem(KEY)) || [];
            tbody.innerHTML = "";
            let total = 0;
            h.sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
            h.forEach(i => {
                total += Number(i.precio);
                const fila = tbody.insertRow();
                fila.innerHTML = `
                    <td><b>${i.fecha}</b><br><span style="color:var(--azul-cobalto)">${i.servicio}</span></td>
                    <td><b>${i.marca}</b><br><small>${i.lugar}</small></td>
                    <td><small>${i.detalle}</small></td>
                    <td><b style="color:var(--verde-exito)">$${Number(i.precio).toLocaleString()}</b><br><span class="pago-tag">${i.metodo}</span></td>
                    <td>${Number(i.km).toLocaleString()}</td>
                    <td style="color:var(--azul-cobalto); font-weight:bold">${Number(i.prox).toLocaleString()}</td>
                    <td><button onclick="borrar(${i.id})" style="background:transparent; border:1px solid #333; color:#ef4444; border-radius:8px; padding:8px 12px; cursor:pointer">X</button></td>
                `;
            });
            document.getElementById('totalGastado').innerText = "$ " + total.toLocaleString();
            document.getElementById('totalRegistros').innerText = h.length + " Servicios en Auditoría";
        }

        function borrar(id) {
            if(confirm("¿Eliminar este registro técnico de la base de datos?")) {
                let h = JSON.parse(localStorage.getItem(KEY)) || [];
                h = h.filter(x => x.id !== id);
                localStorage.setItem(KEY, JSON.stringify(h));
                dibujar();
            }
        }

        function filtrar() {
            let v = document.getElementById("buscador").value.toUpperCase();
            let filas = document.querySelector("#tablaMain tbody").rows;
            for (let f of filas) f.style.display = f.innerText.toUpperCase().includes(v) ? "" : "none";
        }

        function exportar() {
            const h = JSON.parse(localStorage.getItem(KEY)) || [];
            if(h.length === 0) return alert("No hay datos para exportar");
            let csv = "sep=;\nFecha;Servicio;Marca;Lugar;Detalle;Precio;Metodo;KM_Actual;KM_Prox\n";
            h.forEach(i => csv += `${i.fecha};${i.servicio};${i.marca};${i.lugar};${i.detalle};${i.precio};${i.metodo};${i.km};${i.prox}\n`);
            const blob = new Blob(["\ufeff", csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = 'AUDITORIA_SANDERO_GOLD.csv';
            link.click();
        }

        function importar(input) {
            const reader = new FileReader();
            reader.onload = function() {
                try {
                    const lines = reader.result.split('\n').slice(2);
                    let historial = [];
                    lines.forEach(line => {
                        const d = line.split(';');
                        if(d.length >= 8) {
                            historial.push({
                                id: Date.now() + Math.random(),
                                fecha: d[0], servicio: d[1], marca: d[2],
                                lugar: d[3], detalle: d[4], precio: d[5],
                                metodo: d[6], km: d[7], prox: d[8] || "0"
                            });
                        }
                    });
                    localStorage.setItem(KEY, JSON.stringify(historial));
                    dibujar();
                    alert("✅ Base de Datos Sincronizada");
                } catch(e) { alert("Error en estructura de datos CSV."); }
            };
            reader.readAsText(input.files[0]);
        }
    </script>
</body>
</html>
